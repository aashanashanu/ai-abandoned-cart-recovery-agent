AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  SAM template to deploy an EventBridge -> Lambda ingestion pipeline that
  indexes events into Elasticsearch/OpenSearch and maintains cart_state documents.

Parameters:
  EsEndpoint:
    Type: String
    Default: ""
    Description: Elasticsearch/OpenSearch endpoint (https://...)
  EsApiKey:
    Type: String
    Default: ""
    Description: (Optional) API key for Elasticsearch (id:key). Will be base64-encoded by the function.
  EsUsername:
    Type: String
    Default: ""
  EsPassword:
    Type: String
    Default: ""
  CheckAtMinutes:
    Type: Number
    Default: 30
    Description: Minutes to add to last_seen when computing check_at for cart_state
  EventBusName:
    Type: String
    Description: Name of the custom EventBridge bus to use for events

Resources:
  EventIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AbandonedCartEventIngest
      Runtime: python3.9
      Handler: handler.lambda_handler
      CodeUri: lambda/event_ingest/
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          ES_ENDPOINT: !Ref EsEndpoint
          ES_API_KEY: !Ref EsApiKey
          ES_USERNAME: !Ref EsUsername
          ES_PASSWORD: !Ref EsPassword
          CHECK_AT_MINUTES: !Ref CheckAtMinutes
          EVENT_BUS_NAME: !Ref EventBusName
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        FromEventBridge:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref EventBusName
            Pattern:
              source:
                - "ai-abandoned-cart"

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt EventIngestFunction.Arn
  FunctionName:
    Description: Lambda function name
    Value: !Ref EventIngestFunction
