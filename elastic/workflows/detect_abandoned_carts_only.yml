name: Detect Abandoned Carts (IDs)
description: Scheduled workflow that detects abandoned carts and returns cart IDs as output.
enabled: true
tags: ["ecommerce","abandonment"]
triggers:
  - type: manual


steps:
  - name: detect_by_cart
    type: elasticsearch.search
    with:
      index: cart_events
      size: 0
      query:
        bool:
          filter:
            - range:
                "@timestamp":
                  gte: "now-24h"
      aggregations:
        by_cart:
          terms:
            field: cart_id
            size: 1000
          aggregations:
            last_seen:
              max:
                field: "@timestamp"
            last_event:
              top_hits:
                size: 1
                sort:
                  - "@timestamp:desc"
                _source:
                  includes:
                    - "cart_id"
                    - "customer_id"
                    - "cart_value"
                    - "event_type"
                    - "@timestamp"

  - name: collect_abandoned_ids
    type: data.set
    with:
      abandoned_cart_ids: >-
        {% assign ids = [] %}
        {% for b in steps.detect_by_cart.output.aggregations.by_cart.buckets %}
          {% assign last = b.last_seen.value_as_string %}
          {% assign evt = b.last_event.hits.hits[0]._source %}
          {% comment %}
            Consider cart abandoned when last event older than 30 minutes
            and last event is not a purchase/completion.
          {% endcomment %}
          {% if last and last < "now-30m" and evt.event_type != "checkout_completed" and evt.event_type != "payment_success" %}
            {% assign ids = ids | push: b.key %}
          {% endif %}
        {% endfor %}
        {{ ids }}

